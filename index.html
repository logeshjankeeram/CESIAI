<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Controlled Presentation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 { margin-bottom: 5px; font-size: 22px; }

    .subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 10px; }

    .controls { margin-bottom: 10px; display: flex; gap: 10px; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .status { font-size: 13px; margin-bottom: 8px; opacity: 0.8; }

    .mic-visual {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #22c55e 20%, #065f46 70%);
      margin-bottom: 10px;
      transform: scale(1);
      transition: transform 0.1s ease-out;
    }

    .iframe-container {
      width: 95%;
      max-width: 1000px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Voice-Controlled Presentation</h1>
  <div class="subtitle">Say: "next" or "back"</div>

  <div class="controls">
    <button onclick="openFullscreen()">Full Screen</button>
    <button onclick="startVoice()">Start Voice</button>
    <button onclick="stopVoice()">Stop Voice</button>
  </div>

  <div class="status" id="status">Voice: OFF</div>

  <div class="mic-visual" id="micVisual"></div>

  <div class="iframe-container" id="iframeBox">
    <iframe id="presentationFrame" src="https://gamma.app/embed/7xlph3hrjciwd2u" allow="fullscreen"></iframe>
  </div>

  <script>
    let recognition;
    let audioContext, analyser, dataArray, micStream;

    function openFullscreen() {
      const elem = document.getElementById("iframeBox");
      if (elem.requestFullscreen) elem.requestFullscreen();
    }

    function pressKey(key) {
      const iframe = document.getElementById("presentationFrame");
      iframe.focus();
      document.dispatchEvent(new KeyboardEvent("keydown", { key: key }));
    }

    function startVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("Use Google Chrome for voice control");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        document.getElementById("status").innerText = "Heard: " + transcript;

        if (transcript.includes("next")) pressKey("ArrowRight");
        if (transcript.includes("back") || transcript.includes("previous")) pressKey("ArrowLeft");
      };

      recognition.start();
      document.getElementById("status").innerText = "Voice: ON";

      startMicVisualization();
    }

    function stopVoice() {
      if (recognition) recognition.stop();
      if (audioContext) audioContext.close();
      document.getElementById("status").innerText = "Voice: OFF";
    }

    async function startMicVisualization() {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();

      const source = audioContext.createMediaStreamSource(micStream);
      source.connect(analyser);

      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      function animate() {
        analyser.getByteFrequencyData(dataArray);

        let sum = 0;
        for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
        let avg = sum / bufferLength;

        const scale = 1 + avg / 200;
        document.getElementById("micVisual").style.transform = `scale(${scale})`;

        requestAnimationFrame(animate);
      }

      animate();
    }
  </script>

</body>
</html>
