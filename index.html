<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predicting Diabetes Risk</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
      text-align: center;
    }

    .iframe-container {
      width: 90%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .controls {
      margin-bottom: 15px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <h1>Predicting Diabetes Risk from Health-Survey Data</h1>

  <div class="controls">
    <button onclick="openFullscreen()">Full Screen</button>
  </div>

  <div class="iframe-container" id="iframeBox">
    <iframe 
      src="https://gamma.app/embed/7xlph3hrjciwd2u"
      allow="fullscreen"
      title="Predicting Diabetes Risk from Health-Survey Data">
    </iframe>
  </div>

  <script>
    function openFullscreen() {
      const elem = document.getElementById("iframeBox");
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }
  </script>

</body>
</html>
